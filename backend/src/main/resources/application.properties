spring.application.name=backend

# Render assigns a dynamic port, so we use the PORT variable provided by the environment.
# If no port is provided (like when running locally), it defaults to 8080.
server.port=${PORT:8080}
server.address=0.0.0.0

# Database Connection (Using Environment Variables for security)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Firebase Path (This points to the Secret File we will mount on Render)
firebase.service-account.path=${FIREBASE_SERVICE_ACCOUNT_PATH}
